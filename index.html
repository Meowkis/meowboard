<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script defer src="scripts/index.js"></script>
    <link rel="stylesheet" href="styles/index.css">
    <title>Meowkis's Meowboard</title>
</head>
<body>
    <header>
        <h1>
        Welcome to Meowboard :3
        </h1>
    </header>
    <main>
        <div class="card">
            <div class="media-placeholder">
                <img src="https://i.pinimg.com/originals/1b/32/f7/1b32f7188d15f2576c56d0559d2de6cc.gif" alt="11">
            </div>
            <p class="title">Test.</p>
        </div>
        <div class="card">
    <div class="media-placeholder quote-placeholder">
        <blockquote>
            “Reality is just a very persistent illusion.”
        </blockquote>
        <cite>— Albert Einstein</cite>
    </div>
    <p class="title">Quote card.</p>
</div>
<div class="card">
    <div class="media-placeholder audio-placeholder">
        <p class="audio-icon">♪</p>

        <audio controls>
            <source src="audio/meow.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </div>
    <p class="title">Audio card.</p>
</div>
<div class="card">
    <div class="media-placeholder">
        <video controls>
            <source src="video/cat.mp4" type="video/mp4">
            Your browser does not support video.
        </video>
    </div>
    <p class="title">Video card.</p>
</div>
<div class="card">
    <div class="media-placeholder youtube-placeholder">
        <iframe
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="YouTube video"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
    </div>
    <p class="title">YouTube card.</p>
</div>
    </main>
</body>
</html>
